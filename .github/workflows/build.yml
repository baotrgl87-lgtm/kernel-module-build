name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make bc libelf-dev libssl-dev python3 flex bison git clang lld llvm libdw-dev

    - name: Download GKI kernel exact commit
      run: |
        git clone -b android16-6.12 https://android.googlesource.com/kernel/common.git kernel_gki
        cd kernel_gki
        git checkout b2a876903b49
        head -10 Makefile
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 kernelversion

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-info
        path: "kernel_gki/Makefile"
