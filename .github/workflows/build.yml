name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc libelf-dev libssl-dev python3 flex bison git

    - name: Download OnePlus kernel source
      run: |
        git clone --depth=1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8750.git kernel_oplus
        cd kernel_oplus
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oplus_debug_defconfig 2>/dev/null || \
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j4
        touch Module.symvers

    - name: Build module
      run: |
        cp kernel_oplus/Module.symvers . 2>/dev/null || true
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C kernel_oplus \
          M=$(pwd) modules -j4 \
          KBUILD_MODPOST_WARN=1
        modinfo net_extreme.ko

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
