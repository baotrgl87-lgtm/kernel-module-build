name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc libelf-dev libssl-dev python3 flex bison

    - name: Download GKI kernel
      run: |
        git clone --depth=1 -b android16-6.12 https://android.googlesource.com/kernel/common.git kernel_gki &
        PID=$!
        sleep 300 && kill $PID 2>/dev/null &
        wait $PID || true
        if [ ! -d kernel_gki ]; then
          git clone --depth=1 https://github.com/armbian/linux-kernel-cache.git kernel_gki || true
        fi
        ls kernel_gki/

    - name: Prepare kernel
      run: |
        cd kernel_gki
        echo "-android16-5" > localversion
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig 2>/dev/null || \
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
        touch Module.symvers

    - name: Build module
      run: |
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C kernel_gki \
          M=$(pwd) modules -j$(nproc) \
          KBUILD_MODPOST_WARN=1
        modinfo net_extreme.ko

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
