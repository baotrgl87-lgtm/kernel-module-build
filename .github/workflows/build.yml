name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc libelf-dev libssl-dev python3 flex bison

    - name: Download GKI kernel with android16 config
      run: |
        git clone --depth=1 -b android16-6.12 https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/kernel/common.git kernel_gki
        cd kernel_gki
        # 设置正确的localversion
        echo "-android16-5" > localversion
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
        touch Module.symvers

    - name: Build module
      run: |
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C kernel_gki \
          M=$(pwd) modules -j$(nproc) \
          KBUILD_MODPOST_WARN=1
        modinfo net_extreme.ko

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
