name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make wget
    
    - name: Download kernel headers
      run: |
        wget -q https://github.com/OnePlusOSS/android_kernel_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_15.0.0_oneplus13.zip -O kernel.zip || true
        # 使用通用GKI内核头文件
        sudo apt-get install -y linux-headers-$(uname -r)
    
    - name: Build module for arm64
      run: |
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C /lib/modules/$(uname -r)/build \
          M=$(pwd) modules 2>&1 || true
        file net_extreme.ko 2>/dev/null || echo "Build attempted"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module
        path: "*.ko"
        if-no-files-found: warn
