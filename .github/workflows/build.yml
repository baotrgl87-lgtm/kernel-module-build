name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu \
          make bc libelf-dev libssl-dev \
          python3 flex bison wget curl

    - name: Setup Android kernel build tools
      run: |
        mkdir -p kernel_headers/include
        # 下载预编译的GKI内核头文件
        wget -q "https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/linux-msft-wsl-6.1.21.3.tar.gz" -O kernel.tar.gz || true
        # 使用Ubuntu的arm64内核头文件作为基础
        sudo apt-get install -y linux-headers-generic
        cp -r /usr/src/linux-headers-*/include kernel_headers/ 2>/dev/null || true
        
        # 创建最小化内核构建环境
        mkdir -p fake_kernel
        cp -r /usr/src/linux-headers-$(ls /usr/src/ | grep generic | head -1)/* fake_kernel/ 2>/dev/null || true
        echo "-android16-5" > fake_kernel/localversion 2>/dev/null || true

    - name: Build module
      run: |
        KERNEL_DIR=$(ls /usr/src/ | grep "linux-headers.*generic" | head -1)
        echo "Using kernel: $KERNEL_DIR"
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C /usr/src/$KERNEL_DIR \
          M=$(pwd) modules -j$(nproc) \
          KBUILD_MODPOST_WARN=1 2>&1
        ls -la *.ko 2>/dev/null || echo "No .ko files"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
        if-no-files-found: warn
