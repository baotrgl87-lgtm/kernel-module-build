name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc libelf-dev libssl-dev python3 flex bison

    - name: Download exact kernel source
      run: |
        git clone --depth=1 -b android16-6.12-2025-05 https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/kernel/common.git kernel_gki || \
        git clone --depth=1 -b android16-6.12 https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/kernel/common.git kernel_gki
        cd kernel_gki
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j4
        touch Module.symvers

    - name: Build module
      run: |
        cp kernel_gki/Module.symvers .
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C kernel_gki \
          M=$(pwd) modules -j4 \
          KBUILD_MODPOST_WARN=1
        ls -la *.ko
        modinfo net_extreme.ko

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
