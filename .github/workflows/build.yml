name: Build Kernel Module
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make bc libelf-dev libssl-dev python3 flex bison

    - name: Download Android GKI kernel source
      run: |
        git clone --depth=1 -b android16-6.12 https://android.googlesource.com/kernel/common.git kernel_gki
        cd kernel_gki
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j4

    - name: Build module
      run: |
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          -C kernel_gki \
          M=$(pwd) modules -j4
        ls -la *.ko

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-module-arm64
        path: "*.ko"
